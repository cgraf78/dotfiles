# Dependency registry for dotfiles.
# Format: name  method  [cmd]  [aliases]  [filter]
#
# method:     pkg | github:repo | github:release | custom
# cmd:        command to check (defaults to name if omitted or -).
#             Supports mgr:name qualifiers (e.g. apt:batcat).
# aliases:    For pkg: per-manager package name overrides as mgr:name pairs,
#             comma-separated (e.g. apt:fd-find,dnf:fd-find). Use NONE to
#             skip on a platform (e.g. apt:NONE). Use - for no overrides.
# filter:     comma-separated filter tokens with os: or host: prefixes.
#             os: matches platform (linux, macos, wsl). Prefix ! to exclude.
#             host: matches hostname (hostname -s, case-insensitive).
#
# Prerequisites: git (all platforms), brew (macOS) must be pre-installed.
# Adding a new system package: just add "name  pkg" — no code changes.

# name                                    method           cmd              aliases                                              filter
# ────                                    ──────           ───              ───────                                              ──────

# System packages
zsh                                       pkg              -                brew:NONE
jq                                        pkg
tmux                                      pkg
fzf                                       pkg
atuin                                     pkg
zoxide                                    pkg
bat                                       pkg              apt:batcat
fd                                        pkg              apt:fdfind       apt:fd-find,dnf:fd-find
eza                                       pkg
delta                                     pkg              -                brew:git-delta,apt:git-delta,dnf:git-delta,pacman:git-delta
ripgrep                                   pkg              rg
htop                                      pkg
ncdu                                      pkg
hyperfine                                 pkg
tree                                      pkg
shellcheck                                pkg              -                dnf:ShellCheck
gh                                        pkg              -                pacman:github-cli
git-absorb                                pkg
autossh                                   pkg
unzip                                     pkg
zip                                       pkg
dust                                      pkg              -                -                                                    os:macos
python                                    pkg              python3          brew:python,apt:python3,dnf:python3,pacman:python
python-venv                               pkg              -                brew:NONE,apt:python3-venv,dnf:NONE,pacman:NONE
clangd                                    pkg              -                brew:llvm,dnf:clang-tools-extra,pacman:clang
clang-format                              pkg              -                dnf:clang-tools-extra,pacman:clang
node                                      pkg              -                apt:nodejs,dnf:nodejs,pacman:nodejs
npm                                       pkg              -                brew:NONE,dnf:NONE,pacman:NONE
rustfmt                                   pkg              -                brew:rust,dnf:rustfmt,pacman:rust

