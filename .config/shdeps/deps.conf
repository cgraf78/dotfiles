# Dependency registry for dotbootstrap.
# Machine-local entries go in deps.local.conf (untracked, same format).
# Format: name  method  [cmd]  [cmd_alt]  [source]  [platforms]  [hosts]
#
# method:     pkg | git | binary | custom
# cmd:        binary to check (defaults to name if omitted or -)
# cmd_alt:    alternate binary on some OSes (e.g. batcat for bat)
# source:     For pkg: OS-specific package name overrides as mgr:name pairs,
#             comma-separated (e.g. apt:fd-find,dnf:fd-find). Use NONE to
#             skip on a platform (e.g. apt:NONE). Use - for no overrides.
#             For git/binary: GitHub owner/repo.
# platforms:  comma-separated platform filter (optional, defaults to all).
#             Values: linux, macos, wsl. Prefix with ! to exclude.
#             Examples: linux,macos (only those), !wsl (all except WSL).
# hosts:      comma-separated hostname filter (optional, defaults to all).
#             Matches against short hostname (hostname -s), case-insensitive.
#
# Prerequisites: git (all platforms), brew (macOS) must be pre-installed.
# Adding a new system package: just add "name  pkg" — no code changes.

# name                         method    cmd         cmd-alt   source                                              platforms   hosts
# ────                         ──────    ───         ───────   ──────                                              ─────────   ─────

# System packages
zsh                            pkg       -           -         brew:NONE
jq                             pkg
tmux                           pkg
fzf                            pkg
atuin                          pkg
zoxide                         pkg
bat                            pkg       bat         batcat
fd                             pkg       fd          fdfind    apt:fd-find,dnf:fd-find
eza                            pkg
delta                          pkg       -           -         brew:git-delta,apt:git-delta,dnf:git-delta,pacman:git-delta
ripgrep                        pkg       rg
htop                           pkg
ncdu                           pkg
hyperfine                      pkg
tree                           pkg
shellcheck                     pkg       -           -         dnf:ShellCheck
gh                             pkg       -           -         pacman:github-cli
autossh                        pkg
unzip                          pkg
zip                            pkg
dust                           pkg       -           -         -                                                   macos
python                         pkg       python3     python    brew:python,apt:python3,dnf:python3,pacman:python
python-venv                    pkg       -           -         brew:NONE,apt:python3-venv,dnf:NONE,pacman:NONE
clangd                         pkg       -           -         brew:llvm,dnf:clang-tools-extra,pacman:clang
clang-format                   pkg       -           -         dnf:clang-tools-extra,pacman:clang
node                           pkg       -           -         apt:nodejs,dnf:nodejs,pacman:nodejs
npm                            pkg       -           -         brew:NONE,dnf:NONE,pacman:NONE
rustfmt                        pkg       -           -         brew:rust,dnf:rustfmt,pacman:rust

# Git-based tools
ds                             git       -           -         cgraf78/ds.git
gstack                         git       -           -         garrytan/gstack.git
bash-preexec                   git       -           -         rcaloras/bash-preexec.git
zsh-autosuggestions            git       -           -         zsh-users/zsh-autosuggestions.git
zsh-completions                git       -           -         zsh-users/zsh-completions.git
zsh-history-substring-search   git       -           -         zsh-users/zsh-history-substring-search.git
zsh-syntax-highlighting        git       -           -         zsh-users/zsh-syntax-highlighting.git

# GitHub release binary (matches OS and arch from release assets)
neovim                         binary    nvim        -         neovim/neovim
shfmt                          binary    -           -         mvdan/sh
direnv                         binary    -           -         direnv/direnv
yq                             binary    -           -         mikefarah/yq
gum                            binary    -           -         charmbracelet/gum
lazygit                        binary    -           -         jesseduffield/lazygit
jj                             binary    -           -         martinvonz/jj
dust                           binary    -           -         bootandy/dust                                       !macos
bottom                         binary    btm         -         ClementTsang/bottom
codex                          binary    -           -         openai/codex                                        -           nas

# Custom (entirely managed by custom hooks)
xclip                          custom
nerd-fonts                     custom
wezterm                        custom
