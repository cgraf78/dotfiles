# Dependency registry for dotfiles — toolchains.
# Format: name  method  [cmd]  [aliases]  [filter]
#
# method:     pkg | github:repo | github:release | cargo | go | uv | custom
# cmd:        command to check (defaults to name if omitted or -).
#             Supports mgr:name qualifiers (e.g. apt:batcat).
# aliases:    For pkg: per-manager package name overrides as mgr:name pairs,
#             comma-separated (e.g. apt:fd-find,dnf:fd-find). Use NONE to
#             skip on a platform (e.g. apt:NONE). Use - for no overrides.
# filter:     comma-separated filter tokens with os: or host: prefixes.
#             os: matches platform (linux, macos, wsl). Prefix ! to exclude.
#             host: matches hostname (hostname -s, case-insensitive).
#
# Prerequisites: git (all platforms), brew (macOS) must be pre-installed.
# Adding a new system package: just add "name  pkg" to 10-deps.conf — no
# code changes.
#
# This file loads first (00-*). shdeps installs `pkg` deps before non-pkg
# deps, so the language toolchains here are available on PATH before any
# `cargo`/`go`/`uv` method dep in 10-deps.conf runs on first install.
# `astral-sh/uv` is listed here rather than with other github:release deps
# so its binary installs before any uv method dep later in the stack.

# name                                    method           cmd           aliases                                        filter
# ────                                    ──────           ───           ───────                                        ──────

# Rust — brings `cargo`. On brew/pacman, the `rust` package bundles rustc +
# cargo + rustfmt; apt and dnf ship `cargo` as its own package.
cargo                                     pkg              -             brew:rust,pacman:rust
# Ensure a default Rust toolchain is active. On platforms that install rustup
# as a shim (apt, brew CI runners), no toolchain is selected by default.
rust-toolchain                            custom

# Go toolchain. Debian/Ubuntu call the package `golang-go`; RHEL/CentOS/Fedora
# call it `golang`. brew and pacman use the default `go`.
go                                        pkg              -             apt:golang-go,dnf:golang

# Python — required by `uv` itself and by many Python-based tools.
python                                    pkg              python3       apt:python3,dnf:python3
python-venv                               pkg              -             brew:NONE,apt:python3-venv,dnf:NONE,pacman:NONE

# Node/npm — for JavaScript tooling.
node                                      pkg              -             apt:nodejs,dnf:nodejs,pacman:nodejs
npm                                       pkg              -             brew:NONE,dnf:NONE

# uv — Astral's Python CLI tool installer. GitHub release gives prebuilt
# binaries for every platform.
astral-sh/uv                              github:release   uv
