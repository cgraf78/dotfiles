# Global mise config — tools that mise manages at the user level.
#
# Loaded by mise automatically from $XDG_CONFIG_HOME/mise/config.toml.
# The `jdx/mise` post-install hook in shdeps runs `mise install`
# after mise itself is installed or updated, so any additions here
# are picked up on the next `dot update`.
#
# Global formatter/linter toolset migrated from shdeps. Prefer the
# `aqua:<owner>/<repo>` backend when a tool ships prebuilt
# github-release binaries — it avoids compilation (cargo) and
# package-manager egress (npm) that bite on locked-down hosts.
# Aqua handles asset naming, checksum verification, and execute
# bits correctly out of the box; the `ubi:` backend assumes a `v`
# tag prefix that some projects (e.g. selene) don't use, and the
# raw `github:` backend doesn't force the execute bit on macOS zip
# payloads.
#
# `rvben/rumdl` uses `ubi:` instead of `aqua:` because aqua's
# baked-in registry entry enables SLSA attestation verification,
# and its workflow-path regex (`rvben/rumdl/\.github/workflows/
# release\.yml`) doesn't match the relative path
# (`.github/workflows/release.yml`) in rumdl's published
# provenance. Aqua rejects the install. The real fix is a
# regex update in aquaproj/aqua-registry; until that ships,
# route rumdl through `ubi:`. Integrity is still enforced
# via the committed `mise.lock` hashes — mise verifies every
# subsequent install against the recorded SHA256.

[tools]
# GitHub release binaries via aqua.
"aqua:astral-sh/ruff" = "latest"
"aqua:biomejs/biome" = "latest"
"aqua:google/yamlfmt" = "latest"
"aqua:JohnnyMorganz/StyLua" = "latest"
"aqua:Kampfkarren/selene" = "latest"
"aqua:koalaman/shellcheck" = "latest"
"aqua:LuaLS/lua-language-server" = "latest"
"aqua:artempyanykh/marksman" = "latest"
"aqua:mvdan/sh" = "latest"
"aqua:rhysd/actionlint" = "latest"
"aqua:rust-lang/rust-analyzer" = "latest"
"aqua:tamasfe/taplo" = "latest"

# See the note above for why rumdl uses `ubi:` instead of `aqua:`.
"ubi:rvben/rumdl" = "latest"
