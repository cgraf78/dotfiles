# Dependency registry for dotbootstrap.
# Format: name  method  [cmd]  [cmd_alt]  [pkg_overrides]  [repo]  [dir]
#
# method:         pkg | git | appimage | custom
# cmd:            binary to check (defaults to name if omitted or -)
# cmd_alt:        alternate binary on some OSes (e.g. batcat for bat)
# pkg_overrides:  OS-specific package names as mgr:name pairs, comma-separated
#                 (e.g. apt:fd-find,dnf:fd-find). Use NONE to skip on a
#                 platform (e.g. apt:NONE). Use - for no overrides.
# repo:           GitHub owner/repo (for git/appimage methods)
# dir:            install dir relative to $HOME (for git method)
#
# Prerequisites: git (all platforms), brew (macOS) must be pre-installed.
# Adding a new system package: just add "name  pkg" — no code changes.

# name          method    cmd         cmd-alt   overrides               repo                        dir
# ────          ──────    ───         ───────   ─────────               ────                        ───

# System packages
jq              pkg
tmux            pkg
fzf             pkg
atuin           pkg
zoxide          pkg
bat             pkg       bat         batcat
fd              pkg       fd          fdfind    apt:fd-find,dnf:fd-find
eza             pkg
delta           pkg       -           -         brew:git-delta,apt:git-delta,dnf:git-delta,pacman:git-delta
ripgrep         pkg       rg
htop            pkg
ncdu            pkg
hyperfine       pkg
tree            pkg
shellcheck      pkg       -           -         dnf:ShellCheck
gh              pkg       -           -         pacman:github-cli
yq              pkg       -           -         apt:NONE,dnf:NONE
autossh         pkg
direnv          pkg
unzip           pkg
zip             pkg
python          pkg       python3     python    brew:python,apt:python3,dnf:python3,pacman:python
python-venv     pkg       -           -         brew:NONE,apt:python3-venv,dnf:NONE,pacman:NONE
clangd          pkg       -           -         brew:llvm,dnf:clang-tools-extra,pacman:clang
clang-format    pkg       -           -         dnf:clang-tools-extra,pacman:clang
node            pkg       -           -         apt:nodejs,dnf:nodejs,pacman:nodejs
rustfmt         pkg       -           -         brew:rust,dnf:rustfmt,pacman:rust

# Git-based tools
ds              git       -           -         -                       cgraf78/ds.git              .local/share/ds
vimrc           git       -           -         -                       cgraf78/vimrc.git           .local/share/vimrc
gstack          git       -           -         -                       garrytan/gstack.git         .local/share/gstack
bash-preexec    git       -           -         -                       rcaloras/bash-preexec.git   .local/share/bash-preexec

# AppImage on Linux, falls back to pkg on macOS
neovim          appimage  nvim        -         -                       neovim/neovim

# Custom (entirely managed by custom hooks)
xclip           custom
nerd-fonts      custom
wezterm         custom
