# ~/.tmux.conf

# === Defaults ===
set -g default-command "${SHELL}"
set -s default-terminal "tmux-256color"
set -s escape-time 10

# Enable true color (24-bit) passthrough
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*256col*:Tc"

# Pass through modifier+arrow sequences (Ctrl+Left/Right for word navigation).
# Requires a fresh tmux session (not just tmux source) to take effect.
set -g xterm-keys on
set -g extended-keys on

# Advertise extended-key passthrough so apps inside tmux receive CSI u sequences
# (e.g. Shift+Enter as \x1b[13;2u from WezTerm). Without this tmux strips them.
set -as terminal-features ",xterm-256color:extkeys"


# Explicitly forward Shift+Enter as CSI u sequence to the active pane.
# Needed because apps that don't request extended key mode (e.g. Claude Code)
# won't receive it via the automatic extkeys passthrough.
bind-key -n S-Enter send-keys Escape '[13;2u'

# === Essentials ===
set -g mouse on
set -g status-keys emacs
set -g mode-keys vi
set -g history-limit 100000
set -g set-clipboard on
set -g focus-events on
set -g detach-on-destroy on
set -g update-environment "VSCODE_IPC_HOOK_CLI"
setw -g aggressive-resize on

# Bell: propagate bells from background panes/windows to the terminal
set -g bell-action any
set -g visual-bell off

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# === Status Bar ===
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left

# Colors (uses terminal palette)
set -g status-style 'bg=black fg=green bold'
set -g message-style 'bg=black fg=green bold'
set -g mode-style 'bg=green fg=black bold'

# Left: PREFIX indicator + session
set -g status-left-length 80
set -g status-left '#{?client_prefix,[PREFIX] ,}[#S] '

# Right: path + time
set -g status-right-length 120
set -g status-right '#{pane_current_path}  %H:%M '

# Window tabs
setw -g window-status-style 'bg=black fg=white'
setw -g window-status-current-style 'bg=green fg=black bold'
setw -g window-status-separator ' '
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '

# Disable terminal title changes
set -g set-titles off
set -g allow-rename off
setw -g automatic-rename off

# Pane borders
set -g pane-border-status top
set -g pane-border-format ' #{?@hostname_alias,#{@hostname_alias},#{host_short}} '
setw -g pane-border-style 'fg=white'
setw -g pane-active-border-style 'fg=green'

# Right/left navigate panes if vertical splits exist, otherwise switch windows
bind Right if-shell -F '#{e|<:#{pane_width},#{window_width}}' 'select-pane -R' 'next-window'
bind Left  if-shell -F '#{e|<:#{pane_width},#{window_width}}' 'select-pane -L' 'previous-window'

# vim-tmux-navigator: seamless Ctrl+h/j/k/l between tmux panes and nvim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# === Copy Mode ===
# Don't copy on mouse release — stay in copy mode with selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# Ctrl-c copies selection and exits copy mode (pbcopy on macOS, xclip on Linux)
bind -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "bash -c 'command -v pbcopy >/dev/null 2>&1 && pbcopy || xclip -selection clipboard'"

# Ctrl-v pastes from clipboard (Linux: xclip, macOS: pbpaste)
bind -n C-v run "bash -c 'command -v pbpaste >/dev/null 2>&1 && pbpaste || xclip -o -selection clipboard' | tmux load-buffer - && tmux paste-buffer -p"

# Click exits copy mode only if text is selected; otherwise stays in copy mode
bind -T copy-mode-vi MouseDown1Pane if -F '#{selection_active}' 'send-keys -X cancel' 'send-keys -X clear-selection'

# Copy last command output to clipboard (pane-aware, works with splits)
bind o run-shell 'tmux-copy-last-output'
bind O command-prompt -p 'Copy last N commands:' 'run-shell "tmux-copy-last-output %1"'
