name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: >
          shellcheck -x -P SCRIPTDIR
          .local/bin/dot
          .local/bin/dotbootstrap
          .local/bin/ds
          .local/bin/dotsync
          .config/dot/helpers.sh
          .config/dot/test-helpers.sh

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Bash (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Run dot-test
        run: .local/bin/dot-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run dotbootstrap-test
        run: .local/bin/dotbootstrap-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run ds-test
        run: .local/bin/ds-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run dotsync-test
        run: .local/bin/dotsync-test
        env:
          HOME: ${{ github.workspace }}
