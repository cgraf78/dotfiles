name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install tools (macOS)
        if: runner.os == 'macOS'
        run: brew install bash shellcheck jq zsh

      - name: Run dot-test
        run: .local/bin/dot-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run dotbootstrap-test
        run: .local/bin/dotbootstrap-test
        env:
          HOME: ${{ github.workspace }}
