name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install prereqs (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Install dependencies via dot update
        run: .local/bin/dot update --skip-pull --quiet
        env:
          HOME: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run dot-test
        run: .local/bin/dot-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run dotbootstrap-test
        run: .local/bin/dotbootstrap-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run autoformat-test
        run: .local/bin/autoformat-test
        env:
          HOME: ${{ github.workspace }}
