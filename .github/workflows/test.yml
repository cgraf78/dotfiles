name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: >
          shellcheck -x -P SCRIPTDIR
          .local/bin/dot
          .local/bin/dotbootstrap
          .local/bin/ds
          .local/bin/dotsync
          .config/dot/helpers.sh
          .config/dot/test-helpers.sh

      - name: Check JSON sorting
        run: |
          # Verify that all JSON files are sorted according to our Git filter.
          # If a JSON file is not sorted, it will cause "ghost diffs" on machines
          # with the json-sort filter enabled.
          find . -name "*.json" -not -path "./.git/*" | while read -r f; do
            if ! diff <(jq --sort-keys . "$f") "$f" >/dev/null; then
              echo "Error: $f is not sorted. Run 'jq --sort-keys . \"$f\" > tmp.json && mv tmp.json \"$f\"' to fix."
              exit 1
            fi
          done

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Bash (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Run dot-test
        run: .local/bin/dot-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run dotbootstrap-test
        run: .local/bin/dotbootstrap-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run ds-test
        run: .local/bin/ds-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run dotsync-test
        run: .local/bin/dotsync-test
        env:
          HOME: ${{ github.workspace }}
