name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 7 * * *'

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
          - name: Ubuntu
            runner: ubuntu-latest
          - name: Debian
            runner: ubuntu-latest
            container: debian:stable
          - name: Arch
            runner: ubuntu-latest
            container: archlinux:latest
          - name: CentOS Stream
            runner: ubuntu-latest
            container: quay.io/centos/centos:stream9
          - name: WSL
            runner: ubuntu-latest

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system prereqs
        if: matrix.container || matrix.name == 'macOS'
        run: |
          case "${{ matrix.name }}" in
            macOS)
              brew install bash
              ;;
            Debian)
              apt-get update && apt-get install -y git curl sudo
              ;;
            Arch)
              pacman -Syu --noconfirm git curl sudo
              ;;
            CentOS*)
              dnf install -y git curl sudo
              ;;
          esac

      - name: Simulate WSL environment
        if: matrix.name == 'WSL'
        run: |
          echo 'Linux version 5.15.0 (Microsoft@Microsoft.com)' > /tmp/wsl-proc-version
          sudo mount --bind /tmp/wsl-proc-version /proc/version

      - name: Install dependencies via dot update
        run: |
          .local/bin/dot update --skip-pull --quiet
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        env:
          HOME: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run dot-test
        run: .local/bin/dot-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run dotbootstrap-test
        run: .local/bin/dotbootstrap-test
        env:
          HOME: ${{ github.workspace }}

      - name: Run autoformat-test
        run: .local/bin/autoformat-test
        env:
          HOME: ${{ github.workspace }}
