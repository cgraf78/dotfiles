name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Bash (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Run dot-test
        run: .local/bin/dot-test

      - name: Run ds-test
        run: .local/bin/ds-test

      - name: Run dotsync-test
        run: .local/bin/dotsync-test
